<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FFC107" />
    <link rel="manifest" href="/manifest.json" />
    <title>Trusty Yellow Cabs</title>
    <style>
      #app-loading-screen {
        position: fixed;
        inset: 0;
        background: #FFC107;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loading-screen">
      <div class="spinner"></div>
      <p style="margin-top: 16px; color: white; font-weight: 900; letter-spacing: 0.1em;">TRUSTY YELLOW</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fallback for white screen detection
      window.onload = function() {
        setTimeout(function() {
          var root = document.getElementById('root');
          var loader = document.getElementById('app-loading-screen');
          if (root && root.innerHTML === '' && loader) {
            console.error('App failed to mount in 5s. Showing emergency reload.');
            var btn = document.createElement('button');
            btn.innerHTML = 'RELOAD APP';
            btn.style.cssText = 'position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:white; color:#FFC107; border:none; padding:15px 30px; border-radius:15px; font-weight:900;';
            btn.onclick = function() { localStorage.clear(); location.reload(); };
            document.body.appendChild(btn);
          }
        }, 5000);
      };
    </script>
  </body>
</html>
